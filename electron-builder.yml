appId: com.omni.launcher
productName: Omni
directories:
  buildResources: assets
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
asarUnpack:
  - "**/*.node"
win:
  target: dir
  icon: assets/icon.ico
  signAndEditExecutable: false
