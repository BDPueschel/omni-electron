appId: com.omni.launcher
productName: Omni
directories:
  buildResources: assets
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
win:
  target: nsis
  icon: assets/icon.ico
mac:
  target: dmg
  icon: assets/icon.icns
  category: public.app-category.productivity
nsis:
  oneClick: true
  perMachine: false
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
